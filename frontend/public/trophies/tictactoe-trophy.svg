<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="50%" stop-color="#0d0628"/>
      <stop offset="100%" stop-color="#050211"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="gold-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6a3fbf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg-grad)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="560" height="760" rx="12" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.3"/>
  <rect x="30" y="30" width="540" height="740" rx="8" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>

  <!-- Stars / sparkles -->
  <g opacity="0.6" filter="url(#star-glow)">
    <circle cx="80" cy="70" r="2" fill="#fff"/>
    <circle cx="520" cy="90" r="1.5" fill="#fff"/>
    <circle cx="150" cy="120" r="1" fill="#ffd700"/>
    <circle cx="450" cy="60" r="1.8" fill="#fff"/>
    <circle cx="540" cy="200" r="1.2" fill="#ffd700"/>
    <circle cx="60" cy="250" r="1.5" fill="#fff"/>
    <circle cx="100" cy="400" r="1" fill="#ffd700"/>
    <circle cx="500" cy="380" r="1.3" fill="#fff"/>
    <circle cx="530" cy="500" r="1" fill="#ffd700"/>
    <circle cx="70" cy="550" r="1.5" fill="#fff"/>
  </g>

  <!-- Sparkle shapes -->
  <g fill="#ffd700" opacity="0.5">
    <path d="M120 180 l3-8 3 8 8-3-8 3 3 8-3-8-8 3z"/>
    <path d="M480 150 l3-8 3 8 8-3-8 3 3 8-3-8-8 3z"/>
    <path d="M90 320 l2-6 2 6 6-2-6 2 2 6-2-6-6 2z"/>
    <path d="M510 310 l2-6 2 6 6-2-6 2 2 6-2-6-6 2z"/>
  </g>

  <!-- Trophy cup -->
  <g transform="translate(300, 200)" filter="url(#soft-glow)">
    <!-- Cup body -->
    <path d="M-70,-80 L-60,-80 Q-55,10 -30,40 L30,40 Q55,10 60,-80 L70,-80 Q65,30 35,55 L15,65 L15,85 L35,90 L35,100 L-35,100 L-35,90 L-15,85 L-15,65 L-35,55 Q-65,30 -70,-80 Z" fill="url(#gold-grad)" stroke="#daa520" stroke-width="1"/>
    <!-- Cup rim -->
    <ellipse cx="0" cy="-80" rx="70" ry="10" fill="url(#gold-shine)" stroke="#daa520" stroke-width="0.5"/>
    <!-- Left handle -->
    <path d="M-65,-60 Q-100,-50 -100,-20 Q-100,10 -60,15" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Right handle -->
    <path d="M65,-60 Q100,-50 100,-20 Q100,10 60,15" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Base plate -->
    <ellipse cx="0" cy="100" rx="45" ry="8" fill="url(#gold-grad)" stroke="#b8860b" stroke-width="0.5"/>
    <!-- Shine highlight -->
    <path d="M-30,-70 Q-20,-10 -10,30" fill="none" stroke="#fff8dc" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <!-- Star on cup -->
    <path d="M0,-40 l5,15 16,0-13,10 5,16-13-10-13,10 5-16-13-10 16,0z" fill="#fff8dc" opacity="0.6"/>
  </g>

  <!-- Tic-Tac-Toe grid -->
  <g transform="translate(300, 460)">
    <!-- Grid lines -->
    <line x1="-75" y1="-30" x2="75" y2="-30" stroke="#ffd700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <line x1="-75" y1="30" x2="75" y2="30" stroke="#ffd700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <line x1="-25" y1="-90" x2="-25" y2="90" stroke="#ffd700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <line x1="25" y1="-90" x2="25" y2="90" stroke="#ffd700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

    <!-- X marks (bright cyan) -->
    <g stroke="#00e5ff" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <!-- Top-left X -->
      <line x1="-65" y1="-80" x2="-35" y2="-40"/>
      <line x1="-35" y1="-80" x2="-65" y2="-40"/>
      <!-- Center X -->
      <line x1="-15" y1="-20" x2="15" y2="20"/>
      <line x1="15" y1="-20" x2="-15" y2="20"/>
      <!-- Bottom-right X -->
      <line x1="35" y1="40" x2="65" y2="80"/>
      <line x1="65" y1="40" x2="35" y2="80"/>
    </g>

    <!-- O marks (warm pink) -->
    <g fill="none" stroke="#ff4081" stroke-width="4.5" opacity="0.9">
      <!-- Top-right O -->
      <circle cx="50" cy="-60" r="17"/>
      <!-- Middle-left O -->
      <circle cx="-50" cy="0" r="17"/>
      <!-- Bottom-center O -->
      <circle cx="0" cy="60" r="17"/>
    </g>

    <!-- Winning diagonal line for X -->
    <line x1="-70" y1="-85" x2="70" y2="85" stroke="#00e5ff" stroke-width="3" opacity="0.4" stroke-dasharray="6,4"/>
  </g>

  <!-- Title text -->
  <text x="300" y="590" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="url(#gold-shine)" letter-spacing="4">TIC-TAC-TOE</text>
  <text x="300" y="625" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="url(#gold-shine)" letter-spacing="6">CHAMPION</text>

  <!-- Decorative line under title -->
  <line x1="180" y1="645" x2="420" y2="645" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <circle cx="180" cy="645" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="420" cy="645" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="300" cy="645" r="3" fill="#ffd700" opacity="0.6"/>

  <!-- Player name placeholder -->
  <text id="player-name" x="300" y="690" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#ffffff" letter-spacing="3" opacity="0.95">PLAYER NAME</text>

  <!-- Website URL -->
  <text x="300" y="750" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8a7fbf" letter-spacing="2" opacity="0.7">losclaws.com</text>
</svg>
